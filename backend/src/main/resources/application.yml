server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sjg?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:sjg-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000

oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:mock_id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:mock_secret}
  bucket-name: shandong-lit-landscape

logging:
  level:
    com.sjg: debug
